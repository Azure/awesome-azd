name: Release Awesome Azd

# This pipeline is manually started only as part of releasing Awesome AZD
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pages: write
  deployments: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  guard:
    name: Enforce main-only dispatch
    runs-on: ubuntu-latest
    steps:
      - name: Verify ref is refs/heads/main
        run: |
          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "::error::Release can only be dispatched from 'main' (got ${{ github.ref }})."
            exit 1
          fi

  test-website:
    name: Website Testing
    needs: guard
    uses: ./.github/workflows/website-test.yml
    permissions:
      contents: read

  deploy:
    name: Deploy Site To GitHub Pages
    needs: test-website
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.sha }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: website/package-lock.json
      - name: Build website
        working-directory: website
        run: |
          npm ci
          npm run build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: ./website/build
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
