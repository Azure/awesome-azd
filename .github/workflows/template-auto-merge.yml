name: Template Auto-Merge

on:
  pull_request:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: >-
      github.event.label.name == 'trusted-publisher' &&
      contains(github.event.pull_request.labels.*.name, 'template-submission')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify trusted publisher
        id: verify
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const trustedPath = '.github/trusted-publishers.json';

            if (!fs.existsSync(trustedPath)) {
              core.setFailed('trusted-publishers.json not found');
              return;
            }

            const config = JSON.parse(fs.readFileSync(trustedPath, 'utf8'));

            // The submission PR is created by peter-evans/create-pull-request (github-actions[bot]),
            // so we must check the *original issue submitter*, not the PR author.
            const prBody = context.payload.pull_request.body || '';
            const issueMatch = prBody.match(/from issue #(\d+)/);
            if (!issueMatch) {
              core.setFailed('Could not determine originating issue from PR body');
              return;
            }

            const issueNumber = parseInt(issueMatch[1], 10);
            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
            });
            const submitter = issue.user.login;

            if (!Array.isArray(config.publishers) || !config.publishers.includes(submitter)) {
              core.setFailed(`Issue submitter "${submitter}" is not in the trusted publishers list`);
              return;
            }

            core.info(`Issue submitter "${submitter}" (issue #${issueNumber}) is a trusted publisher`);
            core.setOutput('verified', 'true');

      - name: Wait for CI checks
        if: steps.verify.outputs.verified == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr checks ${{ github.event.pull_request.number }} --watch --fail-fast

      - name: Approve PR
        if: steps.verify.outputs.verified == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr review ${{ github.event.pull_request.number }} --approve --body "Auto-approved: PR author is a trusted publisher."

      - name: Enable auto-merge
        if: steps.verify.outputs.verified == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} --auto --squash
