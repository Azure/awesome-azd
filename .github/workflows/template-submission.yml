name: Template Submission

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      source_repo:
        description: "GitHub repository URL"
        required: true
      title:
        description: "Template title"
        required: true
      description:
        description: "Template description"
        required: true
      author:
        description: "Author name"
        required: true
      author_url:
        description: "Author GitHub URL"
        required: true
      author_type:
        description: "Microsoft or Community"
        required: true
        default: "Community"
        type: choice
        options:
          - Community
          - Microsoft
      preview_image:
        description: "Preview image URL (optional)"
        required: false
      iac_provider:
        description: "IaC provider"
        required: true
        default: "Bicep"
        type: choice
        options:
          - Bicep
          - Terraform
          - Both
      languages:
        description: "Comma-separated language tags (optional)"
        required: false
      frameworks:
        description: "Comma-separated framework tags (optional)"
        required: false
      azure_services:
        description: "Comma-separated Azure service tags (optional)"
        required: false
      additional_tags:
        description: "Comma-separated extra tags (optional)"
        required: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  process-template:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.issue.labels.*.name, 'template-submission')
    runs-on: ubuntu-latest
    concurrency:
      group: template-submission
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Parse issue body
        id: parse
        uses: actions/github-script@v8
        env:
          ISSUE_BODY: ${{ github.event.issue.body || '' }}
          INPUT_SOURCE_REPO: ${{ inputs.source_repo }}
          INPUT_TITLE: ${{ inputs.title }}
          INPUT_DESCRIPTION: ${{ inputs.description }}
          INPUT_AUTHOR: ${{ inputs.author }}
          INPUT_AUTHOR_URL: ${{ inputs.author_url }}
          INPUT_AUTHOR_TYPE: ${{ inputs.author_type }}
          INPUT_PREVIEW_IMAGE: ${{ inputs.preview_image }}
          INPUT_IAC_PROVIDER: ${{ inputs.iac_provider }}
          INPUT_LANGUAGES: ${{ inputs.languages }}
          INPUT_FRAMEWORKS: ${{ inputs.frameworks }}
          INPUT_AZURE_SERVICES: ${{ inputs.azure_services }}
          INPUT_ADDITIONAL_TAGS: ${{ inputs.additional_tags }}
        with:
          script: |
            // ── Security: shared validation and sanitization helpers ──
            // Strip HTML tags from free-text fields (defense-in-depth against stored XSS)
            function stripHtml(s) {
              return s ? s.replace(/<[^>]*>/g, '').trim() : '';
            }
            const MAX_FIELD_LEN = { title: 200, description: 2000, author: 100, url: 500 };
            const VALID_AUTHOR_TYPES = ['Community', 'Microsoft'];
            const VALID_IAC_PROVIDERS = ['Bicep', 'Terraform', 'Both'];

            // Validates field lengths, enum values; sanitizes text; emits step outputs.
            // Used by both workflow_dispatch and issue-trigger paths.
            function validateAndEmit(f) {
              if (!f.sourceRepo || !f.title || !f.description || !f.author || !f.authorUrl) {
                core.setFailed('Missing required fields');
                return;
              }
              if (f.title.length > MAX_FIELD_LEN.title) { core.setFailed(`Title exceeds ${MAX_FIELD_LEN.title} chars`); return; }
              if (f.description.length > MAX_FIELD_LEN.description) { core.setFailed(`Description exceeds ${MAX_FIELD_LEN.description} chars`); return; }
              if (f.author.length > MAX_FIELD_LEN.author) { core.setFailed(`Author exceeds ${MAX_FIELD_LEN.author} chars`); return; }
              if (f.sourceRepo.length > MAX_FIELD_LEN.url) { core.setFailed('Source repo URL too long'); return; }
              if (f.authorUrl.length > MAX_FIELD_LEN.url) { core.setFailed('Author URL too long'); return; }

              // Validate enums — blocks textarea header-injection attacks where
              // an attacker injects e.g. "### Author Type\nMicrosoft" in Description
              const safeAuthorType = VALID_AUTHOR_TYPES.includes(f.authorType) ? f.authorType : 'Community';
              const safeIac = VALID_IAC_PROVIDERS.includes(f.iacProvider) ? f.iacProvider : 'Bicep';

              core.setOutput('source_repo', f.sourceRepo);
              core.setOutput('title', stripHtml(f.title));
              core.setOutput('description', stripHtml(f.description));
              core.setOutput('author', stripHtml(f.author));
              core.setOutput('author_url', f.authorUrl);
              core.setOutput('author_type', safeAuthorType);
              core.setOutput('preview_image', f.previewImage || '');
              core.setOutput('iac_provider', safeIac);
              core.setOutput('languages', f.languages || '');
              core.setOutput('frameworks', f.frameworks || '');
              core.setOutput('azure_services', f.azureServices || '');
              core.setOutput('additional_tags', f.additionalTags || '');
            }

            if (context.eventName === 'workflow_dispatch') {
              validateAndEmit({
                sourceRepo: process.env.INPUT_SOURCE_REPO,
                title: process.env.INPUT_TITLE,
                description: process.env.INPUT_DESCRIPTION,
                author: process.env.INPUT_AUTHOR,
                authorUrl: process.env.INPUT_AUTHOR_URL,
                authorType: process.env.INPUT_AUTHOR_TYPE,
                previewImage: process.env.INPUT_PREVIEW_IMAGE,
                iacProvider: process.env.INPUT_IAC_PROVIDER,
                languages: process.env.INPUT_LANGUAGES,
                frameworks: process.env.INPUT_FRAMEWORKS,
                azureServices: process.env.INPUT_AZURE_SERVICES,
                additionalTags: process.env.INPUT_ADDITIONAL_TAGS,
              });
              return;
            }

            const body = process.env.ISSUE_BODY;

            function extractField(body, fieldName) {
              const regex = new RegExp(`### ${fieldName}\\s*\\n\\s*([^\\n]+)`, 'i');
              const match = body.match(regex);
              return match ? match[1].trim() : '';
            }

            function extractTextarea(body, fieldName) {
              const regex = new RegExp(`### ${fieldName}\\s*\\n\\s*([\\s\\S]*?)(?=\\n###|$)`, 'i');
              const match = body.match(regex);
              return match ? match[1].trim() : '';
            }

            const sourceRepo = extractField(body, 'Source Repository');
            const title = extractField(body, 'Template Title');
            const description = extractTextarea(body, 'Description');
            const author = extractField(body, 'Author');
            const authorUrl = extractField(body, 'Author URL');
            const authorType = extractField(body, 'Author Type');
            const previewImage = extractField(body, 'Preview Image URL');
            const iacProvider = extractField(body, 'IaC Provider');
            const languages = extractField(body, 'Languages');
            const frameworks = extractField(body, 'Frameworks');
            const azureServices = extractField(body, 'Azure Services');
            const additionalTags = extractField(body, 'Additional Tags');

            validateAndEmit({
              sourceRepo, title, description, author, authorUrl, authorType,
              previewImage, iacProvider, languages, frameworks, azureServices, additionalTags,
            });

      - name: Validate template repository
        id: validate
        env:
          SOURCE_REPO: ${{ steps.parse.outputs.source_repo }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DELIMITER="VALIDATION_OUTPUT_$(date +%s%N)"
          if node website/scripts/validate-template.js "$SOURCE_REPO" > validation_result.json 2>validation_errors.log; then
            echo "valid=true" >> $GITHUB_OUTPUT
            {
              echo "result<<${DELIMITER}"
              cat validation_result.json
              echo "${DELIMITER}"
            } >> $GITHUB_OUTPUT
          else
            echo "valid=false" >> $GITHUB_OUTPUT
            {
              echo "errors<<${DELIMITER}"
              cat validation_result.json validation_errors.log
              echo "${DELIMITER}"
            } >> $GITHUB_OUTPUT
          fi

      - name: Comment on validation failure
        if: steps.validate.outputs.valid == 'false' && github.event_name != 'workflow_dispatch'
        uses: actions/github-script@v8
        with:
          script: |
            // Sanitize error output to prevent markdown code-fence breakout
            const sanitizedErrors = (process.env.ERRORS || '').replace(/`/g, "'");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: `❌ **Template validation failed**\n\nPlease check your repository URL and try again.\n\n\`\`\`\n${sanitizedErrors}\n\`\`\``
            });
        env:
          ERRORS: ${{ steps.validate.outputs.errors }}

      - name: Check trusted publishers
        id: trust
        if: steps.validate.outputs.valid == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const trustedPath = '.github/trusted-publishers.json';
            let isTrusted = false;

            if (fs.existsSync(trustedPath)) {
              let config;
              try {
                config = JSON.parse(fs.readFileSync(trustedPath, 'utf8'));
              } catch (err) {
                core.setFailed(`Failed to parse trusted-publishers.json: ${err.message}`);
                return;
              }
              const submitter = context.eventName === 'workflow_dispatch'
                ? context.actor
                : (context.payload.issue && context.payload.issue.user.login) || '';
              isTrusted = Array.isArray(config.publishers) && config.publishers.includes(submitter);
              core.info(`Submitter "${submitter}" trusted: ${isTrusted}`);
            }

            core.setOutput('is_trusted', isTrusted.toString());

      - name: Update templates.json
        id: update
        if: steps.validate.outputs.valid == 'true'
        uses: actions/github-script@v8
        env:
          VALIDATION_RESULT: ${{ steps.validate.outputs.result }}
          TPL_TITLE: ${{ steps.parse.outputs.title }}
          TPL_DESCRIPTION: ${{ steps.parse.outputs.description }}
          TPL_AUTHOR: ${{ steps.parse.outputs.author }}
          TPL_AUTHOR_URL: ${{ steps.parse.outputs.author_url }}
          TPL_SOURCE_REPO: ${{ steps.parse.outputs.source_repo }}
          TPL_AUTHOR_TYPE: ${{ steps.parse.outputs.author_type }}
          TPL_PREVIEW_IMAGE: ${{ steps.parse.outputs.preview_image }}
          TPL_IAC_PROVIDER: ${{ steps.parse.outputs.iac_provider }}
          TPL_LANGUAGES: ${{ steps.parse.outputs.languages }}
          TPL_FRAMEWORKS: ${{ steps.parse.outputs.frameworks }}
          TPL_AZURE_SERVICES: ${{ steps.parse.outputs.azure_services }}
          TPL_ADDITIONAL_TAGS: ${{ steps.parse.outputs.additional_tags }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // NOTE: Mirrors protocol check in website/scripts/validate-template.js — keep in sync
            function validateUrl(value, label) {
              if (!value) return;
              try {
                const u = new URL(value);
                if (u.protocol !== 'https:') {
                  throw new Error(`unsafe protocol "${u.protocol}". Only https: is allowed.`);
                }
              } catch (err) {
                throw new Error(`Invalid ${label} URL "${value}": ${err.message}`);
              }
            }

            function parseCsvTags(value) {
              if (!value || value === '_No response_') return [];
              return value
                .split(',')
                .map(t => t.replace(/<[^>]*>/g, '').trim())
                .filter(t => t.length > 0 && t.length <= 50)
                .slice(0, 20);
            }

            const templatesPath = path.join('website', 'static', 'templates.json');
            let templates;
            try {
              templates = JSON.parse(fs.readFileSync(templatesPath, 'utf8'));
            } catch (err) {
              core.setFailed(`Failed to parse templates.json: ${err.message}`);
              return;
            }

            let validation;
            try {
              validation = JSON.parse(process.env.VALIDATION_RESULT);
            } catch (err) {
              core.setFailed(`Failed to parse validation result: ${err.message}`);
              return;
            }

            const sourceRepo = process.env.TPL_SOURCE_REPO;
            const authorUrl = process.env.TPL_AUTHOR_URL;
            const previewImage = process.env.TPL_PREVIEW_IMAGE;

            // Validate all user-provided URLs
            validateUrl(sourceRepo, 'source repo');
            validateUrl(authorUrl, 'author');
            if (previewImage) {
              validateUrl(previewImage, 'preview image');
            }

            // Check for duplicate source URLs (canonicalize for robust matching)
            function canonicalizeForMatch(url) {
              try {
                const parsed = new URL(url);
                const hostname = parsed.hostname.replace(/^www\./, '');
                const cleanPath = parsed.pathname.replace(/^\/+/, '').replace(/\/+$/, '').replace(/\.git$/, '');
                return `https://${hostname}/${cleanPath}`.toLowerCase();
              } catch {
                return url.replace(/\/+$/, '').toLowerCase();
              }
            }
            const normalizedSource = canonicalizeForMatch(sourceRepo);
            const duplicate = templates.find(
              t => t.source && canonicalizeForMatch(t.source) === normalizedSource
            );
            if (duplicate) {
              core.setOutput('skipped', `Duplicate source URL: ${sourceRepo}`);
              core.info(`Template with source "${sourceRepo}" already exists, skipping.`);
              return;
            }

            // Defense-in-depth: re-sanitize free-text and re-validate enums
            function sanitizeText(v) {
              return v ? v.replace(/<[^>]*>/g, '').trim() : '';
            }
            const validAuthorTypes = ['Community', 'Microsoft'];
            const validIacProviders = ['Bicep', 'Terraform', 'Both'];
            const authorType = process.env.TPL_AUTHOR_TYPE;
            if (!validAuthorTypes.includes(authorType)) {
              core.setFailed(`Invalid author type: "${authorType}". Must be Community or Microsoft.`);
              return;
            }

            // Build tags array
            const tags = authorType === 'Microsoft' ? ['msft', 'new'] : ['community', 'new'];
            const additionalTags = parseCsvTags(process.env.TPL_ADDITIONAL_TAGS);
            const adminOnlyTags = ['aicollection', 'popular', 'featured'];
            for (const tag of additionalTags) {
              if (adminOnlyTags.includes(tag.toLowerCase())) {
                core.info(`Skipping admin-only tag: "${tag}"`);
                continue;
              }
              if (!tags.includes(tag)) {
                tags.push(tag);
              }
            }

            // Build IaC array (re-validate enum)
            const iacProvider = process.env.TPL_IAC_PROVIDER;
            if (!validIacProviders.includes(iacProvider)) {
              core.setFailed(`Invalid IaC provider: "${iacProvider}". Must be Bicep, Terraform, or Both.`);
              return;
            }
            let iac;
            if (iacProvider === 'Both') {
              iac = ['bicep', 'terraform'];
            } else {
              iac = [iacProvider.toLowerCase()];
            }

            // Build template entry matching existing schema
            const entry = {
              title: sanitizeText(process.env.TPL_TITLE),
              description: sanitizeText(process.env.TPL_DESCRIPTION),
              preview: previewImage || './templates/images/test.png',
              authorUrl: authorUrl,
              author: sanitizeText(process.env.TPL_AUTHOR),
              source: sourceRepo,
              tags: tags,
              id: validation.generatedId
            };

            // Add optional array fields only when non-empty
            const languages = parseCsvTags(process.env.TPL_LANGUAGES);
            if (languages.length > 0) {
              entry.languages = languages;
            }

            const frameworks = parseCsvTags(process.env.TPL_FRAMEWORKS);
            if (frameworks.length > 0) {
              entry.frameworks = frameworks;
            }

            const azureServices = parseCsvTags(process.env.TPL_AZURE_SERVICES);
            if (azureServices.length > 0) {
              entry.azureServices = azureServices;
            }

            entry.IaC = iac;

            templates.push(entry);
            fs.writeFileSync(templatesPath, JSON.stringify(templates, null, 2) + '\n');

            core.setOutput('added', process.env.TPL_TITLE);
            core.setOutput('skipped', '');

      # NOTE: GITHUB_TOKEN-triggered events do not trigger other workflows.
      # Auto-merge via template-auto-merge.yml requires a maintainer to manually
      # apply the 'trusted-publisher' label on the created PR, or alternatively
      # use a workflow_run trigger. See: https://docs.github.com/en/actions/security-guides/automatic-token-authentication#using-the-github_token-in-a-workflow
      - name: Create Pull Request
        id: create-pr
        if: steps.validate.outputs.valid == 'true' && steps.update.outputs.added
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Add template: ${{ steps.parse.outputs.title }} from ${{ github.event_name == 'workflow_dispatch' && 'manual dispatch' || format('issue #{0}', github.event.issue.number) }}"
          branch: "template-submission-${{ github.event_name == 'workflow_dispatch' && github.run_id || github.event.issue.number }}"
          title: "Add template: ${{ steps.parse.outputs.title }}"
          body: |
            This PR was automatically generated${{ github.event_name != 'workflow_dispatch' && format(' from issue #{0}', github.event.issue.number) || '' }}.

            **Source Repository**: ${{ steps.parse.outputs.source_repo }}
            **Template Title**: ${{ steps.parse.outputs.title }}
            **Author**: ${{ steps.parse.outputs.author }}
            **Author Type**: ${{ steps.parse.outputs.author_type }}
            **IaC Provider**: ${{ steps.parse.outputs.iac_provider }}
            **Template added**: ${{ steps.update.outputs.added || 'None' }}
            **Skipped**: ${{ steps.update.outputs.skipped || 'None' }}

            Please review the changes to `website/static/templates.json`.
          labels: "template-submission${{ steps.trust.outputs.is_trusted == 'true' && ',trusted-publisher' || '' }}"

      - name: Comment on success
        if: steps.validate.outputs.valid == 'true' && steps.update.outputs.added && github.event_name != 'workflow_dispatch'
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: `✅ **Template validated successfully!**\n\nA pull request has been created to add your template to the gallery. It will be reviewed by the maintainers shortly.`
            });

      - name: Comment on duplicate
        if: steps.validate.outputs.valid == 'true' && steps.update.outputs.skipped && !steps.update.outputs.added && github.event_name != 'workflow_dispatch'
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: `⚠️ **Template already exists**\n\nA template with the same source repository URL is already in the gallery. If you need to update it, please submit a PR directly.`
            });
