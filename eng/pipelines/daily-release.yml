
trigger:
  branches:
    include:
      - main

jobs:
  - job: build_and_commit
    displayName: Build and Commit
    pool:
      vmImage: 'ubuntu-latest'

    steps:
      - checkout: self
        persistCredentials: false

      - script: |
          npm ci
          npm run build
        workingDirectory: website/
        displayName: 'Build Website'

      - script: |
          set -e
          # GitHub git-smart-HTTP only accepts HTTP Basic auth — Bearer/token schemes fail.
          AUTH_HEADER="Authorization: Basic $(printf '%s:' "$GH_PAT" | base64 -w0)"
          mkdir daily-fork
          cd daily-fork
          git init
          git remote add origin "https://github.com/azure-sdk/awesome-azd.git"
          git -c http.extraheader="$AUTH_HEADER" fetch --no-tags origin gh-pages
          git checkout gh-pages
          cp -R ../website/build/* .
          git add .
          if git diff --cached --quiet; then
            echo "No changes to publish — skipping commit and push."
            exit 0
          fi
          git -c user.name="azure-sdk" -c user.email="azuresdk@microsoft.com" commit -m "daily release"
          git -c http.extraheader="$AUTH_HEADER" push --quiet origin gh-pages
        env:
          GH_PAT: $(azuresdk-github-pat)
        displayName: 'Commit to Azure SDK Fork'
